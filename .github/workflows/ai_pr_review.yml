name: AI Code Review

# This action will trigger on pull requests that are opened or updated.
on:
  pull_request:
    types: [opened, synchronize]

# Grant permissions for the workflow to read content and write pull request comments.
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code.
      # Updated to v6 for the latest features and security improvements.
      # `fetch-depth: 0` is important to get the full git history,
      # which allows opencode to create a proper diff.
      - name: Checkout Code
        uses: actions/checkout@v6 # <-- This is the updated line
        with:
          fetch-depth: 0

      # Step 2: Run opencode-review CLI tool.
      # This step uses npx to run the latest version of the tool.
      # The `@latest` tag ensures you are always using the most recent release
      # of opencode-review without needing to change the workflow file.
      - name: Run AI Code Review
        run: npx opencode-review@latest \
          --provider="openai" \
          --model="gpt-4o-mini" \
          --prompt-file=".github/prompts/pr_review_prompt.md"
        env:
          # The GITHUB_TOKEN is automatically provided by GitHub Actions.
          # It's used to post comments on the pull request.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # This is the secret API key you created previously.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}