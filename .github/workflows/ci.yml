name: CI Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'          # Caches dependencies automatically

      - name: Build with Maven
        run: mvn clean verify     # verify is enough for CI — no need to install
