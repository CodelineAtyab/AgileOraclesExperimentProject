name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: 'openai/gpt-4o-mini'
          use_github_token: true
          prompt: |
            Review this pull request:
            - Check for indentation consistency. It can be either 4 spaces or 2 spaces, but not a mix of both.
            - Make sure there are no more than one consecutive blank line in the code.
            - Keeping in mind that the code is for practice purposes, check for any obvious logical errors or potential improvements in the code.
            - The title of the pull request is: ${{ github.event.pull_request.title }}. It should start with a clickup id (e.g., "86ex6r17g") followed by a : (e.g., "86ex6r17g: ") and then the title of clickup ticket (e.g., "86ex6r17g: Implement user authentication").
            - The description of the pull request is: ${{ github.event.pull_request.body }}. It should be meaningful and should include a description of the changes made in the pull request, the reason for the changes, and any relevant information that would help reviewers understand the context of the changes.
            - Also leave a general motivational comment for the contributor based on the review outcome.